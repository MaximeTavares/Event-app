name: ms-auth CI/CD

on:
  push:
    branches: [main]
    paths: ["services/ms-auth/**"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set variables
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER=$OWNER" >> $GITHUB_ENV

      - name: Build & Push
        run: |
          docker build \
            -t ghcr.io/$OWNER/ms-auth:${{ github.sha }} \
            -t ghcr.io/$OWNER/ms-auth:latest \
            ./services/ms-auth

          docker push ghcr.io/$OWNER/ms-auth:${{ github.sha }}
          docker push ghcr.io/$OWNER/ms-auth:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}

          script: |
            cd /opt/event-app/prod

            export IMAGE_TAG=${{ github.sha }}

            export FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            export JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
            export JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            export GEOAPIFY_API_KEY=${{ secrets.GEOAPIFY_API_KEY }}

            docker compose pull ms-auth
            docker compose up -d ms-auth