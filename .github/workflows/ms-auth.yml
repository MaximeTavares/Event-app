name: ms-auth CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "services/ms-auth/**"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Define variables
      - name: Set image tags
        run: |
          echo "IMAGE=ghcr.io/${{ github.repository_owner }}/ms-auth" >> $GITHUB_ENV
          echo "SHA_TAG=${{ github.sha }}" >> $GITHUB_ENV

      # 3. Login GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Build image (multi-tag)
      - name: Build Docker image
        run: |
          docker build \
            -t $IMAGE:latest \
            -t $IMAGE:$SHA_TAG \
            ./services/ms-auth

      # 5. Push latest
      - name: Push latest
        run: |
          docker push $IMAGE:latest

      # 6. Push versioned
      - name: Push versioned
        run: |
          docker push $IMAGE:$SHA_TAG
