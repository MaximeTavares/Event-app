name: ms-auth CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "services/ms-auth/**"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set variables
        run: |
          echo "IMAGE=ghcr.io/${{ github.repository_owner }}/ms-auth" >> $GITHUB_ENV
          echo "SHA_TAG=${{ github.sha }}" >> $GITHUB_ENV

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -t $IMAGE:latest \
            -t $IMAGE:$SHA_TAG \
            ./services/ms-auth

      - name: Push latest
        run: docker push $IMAGE:latest

      - name: Push sha
        run: docker push $IMAGE:$SHA_TAG


  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ubuntu/event-app
            docker compose -f infra/docker/docker-compose.prod.yml pull
            docker compose -f infra/docker/docker-compose.prod.yml up -d
