name: Front - STAGING

on:
  push:
    branches: [develop]
    paths:
      - "apps/front/**"

  workflow_dispatch:


jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      # -------------------------
      # CHECKOUT
      # -------------------------
      - name: Checkout
        uses: actions/checkout@v4


      # -------------------------
      # SET VARIABLES
      # -------------------------
      - name: Set variables
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER=$OWNER" >> $GITHUB_ENV


      # -------------------------
      # SETUP BUILDX
      # -------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3


      # -------------------------
      # LOGIN GHCR
      # -------------------------
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      # -------------------------
      # BUILD & PUSH
      # -------------------------
      - name: Build & Push Front
        uses: docker/build-push-action@v6
        with:
          context: ./apps/front

          push: true

          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL_STAGING }}

          tags: |
            ghcr.io/${{ env.OWNER }}/front:${{ github.sha }}
            ghcr.io/${{ env.OWNER }}/front:latest

          cache-from: type=gha
          cache-to: type=gha,mode=max


      # -------------------------
      # DEPLOY EC2
      # -------------------------
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}

          script: |

            cd /opt/event-app/staging

            export IMAGE_TAG=${{ github.sha }}

            docker compose pull front

            docker compose up -d front

            docker image prune -af