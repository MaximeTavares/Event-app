name: Front - CI/CD

on:
  push:
    branches: [develop]
    paths:
      - "apps/front/**"
  workflow_dispatch:
  pull_request:
    branches: [develop, main]


jobs:

  # =====================================================
  # QUALITY (SONARCLOUD)
  # =====================================================
  quality:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORG }}

  # =====================================================
  # BUILD + PUSH (COMMON)
  # =====================================================
  build:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ github.sha }}

    steps:

      # -------------------------
      # CHECKOUT
      # -------------------------
      - name: Checkout
        uses: actions/checkout@v4


      # -------------------------
      # SET VARIABLES
      # -------------------------
      - name: Set variables
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER=$OWNER" >> $GITHUB_ENV


      # -------------------------
      # SETUP BUILDX
      # -------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3


      # -------------------------
      # LOGIN GHCR
      # -------------------------
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      # -------------------------
      # BUILD & PUSH
      # -------------------------
      - name: Build & Push Front
        uses: docker/build-push-action@v6
        with:
          context: ./apps/front

          push: true

          build-args: |
            VITE_API_URL=${{ github.ref == 'refs/heads/main' && secrets.VITE_API_URL || secrets.VITE_API_URL_STAGING }}

          tags: |
            ghcr.io/${{ env.OWNER }}/front:${{ github.sha }}
            ghcr.io/${{ env.OWNER }}/front:latest

          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =====================================================
  # STAGING DEPLOY (AUTO)
  # =====================================================
  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    needs: build
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Deploy STAGING
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}

          script: |
            cd /opt/event-app/staging

            export IMAGE_TAG=${{ github.sha }}

            docker compose pull front
            docker compose up -d front

  # =====================================================
  # PROD DEPLOY (MANUAL)
  # =====================================================
  deploy-prod:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy PROD
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}

          script: |
            cd /opt/event-app/prod

            export IMAGE_TAG=${{ github.sha }}

            docker compose pull front
            docker compose up -d front