      #   uses: appleboy/ssh-action@v1.0.3
      #   with:
      #     host: ${{ secrets.EC2_HOST }}
      #     username: ubuntu
      #     key: ${{ secrets.EC2_KEY }}
      #     script: |
      #       export IMAGE_TAG=${{ github.sha }}
      #       cd /opt/event-app
      #       docker compose -f docker-compose.prod.yml up -d front