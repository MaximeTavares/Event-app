name: Front - CI/CD

on:
  push:
    branches:
      - develop
    paths:
      - "apps/front/**"

  workflow_dispatch:

  pull_request:
    branches:
      - develop
      - main


jobs:

  # =====================================================
  # QUALITY (SONARCLOUD)
  # =====================================================
  quality:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./apps/front

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/front/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

    #   - name: Cypress test e2e
    #     run: npm run test:e2e

      - name: SonarCloud Scan (Quality Gate)
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.qualitygate.wait=true


  # =====================================================
  # BUILD + PUSH (STAGING + PROD DANS LE MÊME JOB)
  # =====================================================
  build:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set variables
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER=$OWNER" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # =====================================================
      # BUILD STAGING
      # =====================================================
      - name: Build & Push Front STAGING
        if: github.ref == 'refs/heads/develop'
        uses: docker/build-push-action@v6
        with:
          context: ./apps/front

          push: true

          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL_STAGING }}

          tags: |
            ghcr.io/${{ env.OWNER }}/front:staging

          cache-from: type=gha
          cache-to: type=gha,mode=max

      # =====================================================
      # BUILD PROD
      # =====================================================
      - name: Build & Push Front PROD
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./apps/front

          push: true

          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}

          tags: |
            ghcr.io/${{ env.OWNER }}/front:prod

          cache-from: type=gha
          cache-to: type=gha,mode=max


  # =====================================================
  # DEPLOY STAGING
  # =====================================================
  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy STAGING
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}

          script: |
            cd /opt/event-app/staging

            echo "Pulling image..."
            IMAGE_TAG=${{ github.sha }} docker compose pull staging-front

            echo "Starting container..."
            IMAGE_TAG=${{ github.sha }} docker compose up -d staging-front --remove-orphans

            # echo "⏳ Waiting for service..."
            # sleep 10

            # echo "🩺 Healthcheck..."
            # curl -f http://localhost


  # =====================================================
  # DEPLOY PROD
  # =====================================================
  deploy-prod:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy PROD
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}

          script: |
            cd /opt/event-app/prod

            echo "Pulling image..."
            IMAGE_TAG=${{ github.sha }} docker compose pull prod-front

            echo "Starting container..."
            IMAGE_TAG=${{ github.sha }} docker compose up -d prod-front --remove-orphans

            # echo "⏳ Waiting for service..."
            # sleep 10

            # echo "🩺 Healthcheck..."
            # curl -f http://localhost