name: Front CI/CD

on:
  push:
    branches: [main]
    paths: ["apps/front/**"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set variables
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER=$OWNER" >> $GITHUB_ENV

      - name: Build & Push
        run: |
          docker build \
            --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} \
            -t ghcr.io/$OWNER/front:${{ github.sha }} \
            -t ghcr.io/$OWNER/front:latest \
            ./apps/front

          docker push ghcr.io/$OWNER/front:${{ github.sha }}
          docker push ghcr.io/$OWNER/front:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}

          script: |
            cd /opt/event-app/prod

            export IMAGE_TAG=${{ github.sha }}

            docker compose pull front
            docker compose up -d front