name: Front CI/CD

on:
  push:
    branches: [main]
    paths: ["apps/front/**"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Variables
      - name: Set image variables
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE=ghcr.io/$OWNER/front" >> $GITHUB_ENV
          echo "SHA_TAG=${{ github.sha }}" >> $GITHUB_ENV

      # 3. Login GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Setup Buildx (IMPORTANT FIX)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Build & Push (PRO WAY)
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./apps/front
          push: true
          no-cache: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/front:latest
            ghcr.io/${{ github.repository_owner }}/front:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}

      # 6. Deploy (optionnel)
