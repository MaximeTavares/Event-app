name: Gateway - PROD

on:
  workflow_dispatch:


jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      # -------------------------
      # CHECKOUT
      # -------------------------
      - name: Checkout
        uses: actions/checkout@v4


      # -------------------------
      # SET LOWERCASE OWNER
      # -------------------------
      - name: Set variables
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER=$OWNER" >> $GITHUB_ENV


      # -------------------------
      # SETUP DOCKER BUILDX
      # -------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3


      # -------------------------
      # LOGIN GHCR
      # -------------------------
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      # -------------------------
      # BUILD & PUSH
      # -------------------------
      - name: Build & Push Gateway
        uses: docker/build-push-action@v6
        with:
          context: ./apps/gateway

          push: true

          tags: |
            ghcr.io/${{ env.OWNER }}/gateway:${{ github.sha }}
            ghcr.io/${{ env.OWNER }}/gateway:latest

          cache-from: type=gha
          cache-to: type=gha,mode=max


      # -------------------------
      # DEPLOY EC2
      # -------------------------
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}

          script: |

            # -------------------------
            # GO TO PROD FOLDER
            # -------------------------
            cd /opt/event-app/prod


            # -------------------------
            # IMAGE VERSION
            # -------------------------
            export IMAGE_TAG=${{ github.sha }}


            # -------------------------
            # ENV VARIABLES
            # -------------------------
            export FRONTEND_URL=${{ secrets.FRONTEND_URL }}

            export JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
            export JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}

            export GEOAPIFY_API_KEY=${{ secrets.GEOAPIFY_API_KEY }}


            # -------------------------
            # PULL NEW IMAGE
            # -------------------------
            docker compose pull gateway


            # -------------------------
            # RESTART GATEWAY
            # -------------------------
            docker compose up -d gateway


            # -------------------------
            # CLEAN UNUSED IMAGES
            # -------------------------
            docker image prune -af