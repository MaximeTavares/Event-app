name: Gateway - CI/CD

on:
  push:
    branches: [develop]
    paths:
      - "apps/gateway/**"
  workflow_dispatch:
  pull_request:
    branches: [develop, main]


jobs:

  # =====================================================
  # QUALITY (SONARCLOUD)
  # =====================================================
  quality:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./apps/gateway

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/gateway/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test -- --passWithNoTests

      - name: SonarCloud Scan (Quality Gate)
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.qualitygate.wait=true

  # =====================================================
  # BUILD + PUSH (COMMON)
  # =====================================================
  build:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ github.sha }}

    steps:

      # -------------------------
      # CHECKOUT
      # -------------------------
      - name: Checkout
        uses: actions/checkout@v4


      # -------------------------
      # SET LOWERCASE OWNER
      # -------------------------
      - name: Set variables
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER=$OWNER" >> $GITHUB_ENV


      # -------------------------
      # SETUP DOCKER BUILDX
      # -------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3


      # -------------------------
      # LOGIN GHCR
      # -------------------------
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      # -------------------------
      # BUILD & PUSH
      # -------------------------
      - name: Build & Push Gateway
        uses: docker/build-push-action@v6
        with:
          context: ./apps/gateway

          push: true

          tags: |
            ghcr.io/${{ env.OWNER }}/gateway:${{ github.sha }}
            ghcr.io/${{ env.OWNER }}/gateway:latest

          cache-from: type=gha
          cache-to: type=gha,mode=max


  # =====================================================
  # STAGING DEPLOY (AUTO)
  # =====================================================
  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    needs: build
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Deploy STAGING
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}

          script: |
            cd /opt/event-app/staging

            echo "Pulling image..."
            IMAGE_TAG=${{ github.sha }} docker compose pull staging-gateway

            echo "Starting container..."
            IMAGE_TAG=${{ github.sha }} docker compose up -d staging-gateway --remove-orphans

            # echo "⏳ Waiting for service..."
            # sleep 10

            # echo "🩺 Healthcheck..."
            # curl -f http://localhost:3000/health

  # =====================================================
  # PROD DEPLOY (MANUAL)
  # =====================================================
  deploy-prod:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy PROD
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}

          script: |
            cd /opt/event-app/prod

            echo "Pulling image..."
            IMAGE_TAG=${{ github.sha }} docker compose pull prod-gateway

            echo "Starting container..."
            IMAGE_TAG=${{ github.sha }} docker compose up -d prod-gateway --remove-orphans

            # echo "⏳ Waiting for service..."
            # sleep 10

            # echo "🩺 Healthcheck..."
            # curl -f http://localhost:3000/health