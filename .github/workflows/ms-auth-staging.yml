name: Ms-auth - STAGING

on:
  push:
    branches: [develop]
    paths:
      - "services/ms-auth/**"
      
  workflow_dispatch:


jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      # -------------------------
      # CHECKOUT
      # -------------------------
      - name: Checkout
        uses: actions/checkout@v4


      # -------------------------
      # SET VARIABLES
      # -------------------------
      - name: Set variables
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER=$OWNER" >> $GITHUB_ENV


      # -------------------------
      # SETUP BUILDX
      # -------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3


      # -------------------------
      # LOGIN GHCR
      # -------------------------
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      # -------------------------
      # BUILD & PUSH
      # -------------------------
      - name: Build & Push ms-auth
        uses: docker/build-push-action@v6
        with:
          context: ./services/ms-auth

          push: true

          tags: |
            ghcr.io/${{ env.OWNER }}/ms-auth:${{ github.sha }}
            ghcr.io/${{ env.OWNER }}/ms-auth:latest

          cache-from: type=gha
          cache-to: type=gha,mode=max


      # -------------------------
      # DEPLOY EC2
      # -------------------------
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}

          script: |

            cd /opt/event-app/staging

            export IMAGE_TAG=${{ github.sha }}

            export FRONTEND_URL=${{ secrets.FRONTEND_URL_STAGING }}

            export JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
            export JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}

            export GEOAPIFY_API_KEY=${{ secrets.GEOAPIFY_API_KEY }}

            docker compose pull ms-auth

            docker compose up -d ms-auth

            docker image prune -af