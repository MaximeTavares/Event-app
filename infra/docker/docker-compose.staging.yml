services:

  # -------------------------
  # EVENT BUS
  # -------------------------
  nats:
    image: nats:latest
    restart: unless-stopped
    networks:
      - nginx-network


  # -------------------------
  # AUTH SERVICE
  # -------------------------
  ms-auth-staging:
    image: ghcr.io/maximetavares/ms-auth:${IMAGE_TAG}
    restart: unless-stopped

    environment:
      NATS_URL: nats://nats:4222
      MONGO_URL: mongodb://mongo:27017/auth
      FRONTEND_URL: ${FRONTEND_URL}
      GEOAPIFY_API_KEY: ${GEOAPIFY_API_KEY}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}

    depends_on:
      - nats
      - mongo

    networks:
      - nginx-network


  # -------------------------
  # GATEWAY
  # -------------------------
  gateway-staging:
    image: ghcr.io/maximetavares/gateway:${IMAGE_TAG}
    restart: unless-stopped

    environment:
      NATS_URL: nats://nats:4222
      MONGO_URL: mongodb://mongo:27017/auth
      FRONTEND_URL: ${FRONTEND_URL}
      GEOAPIFY_API_KEY: ${GEOAPIFY_API_KEY}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}

    depends_on:
      - nats
      - mongo

    networks:
      - nginx-network


  # -------------------------
  # FRONT
  # -------------------------
  front-staging:
    image: ghcr.io/maximetavares/front:${IMAGE_TAG}
    restart: unless-stopped

    networks:
      - nginx-network


  # -------------------------
  # MONGO
  # -------------------------
  mongo:
    image: mongo:latest
    restart: unless-stopped

    volumes:
      - mongo_data_staging:/data/db

    networks:
      - nginx-network


# -------------------------
# VOLUMES
# -------------------------
volumes:
  mongo_data_staging:


# -------------------------
# NETWORK
# -------------------------
networks:
  nginx-network:
    external: true