services:

  # -------------------------
  # EVENT BUS
  # -------------------------
  nats:
    image: nats:latest
    restart: unless-stopped
    networks:
      - nginx-network


  # -------------------------
  # AUTH SERVICE
  # -------------------------
  ms-auth:
    image: ghcr.io/maximetavares/ms-auth:${IMAGE_TAG}
    restart: unless-stopped

    environment:
      NATS_URL: nats://nats:4222
      MONGO_URL: ${MONGO_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      GEOAPIFY_API_KEY: ${GEOAPIFY_API_KEY}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}

    depends_on:
      - nats

    networks:
      - nginx-network


  # -------------------------
  # GATEWAY
  # -------------------------
  gateway:
    image: ghcr.io/maximetavares/gateway:${IMAGE_TAG}
    restart: unless-stopped

    environment:
      NATS_URL: nats://nats:4222
      MONGO_URL: ${MONGO_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      GEOAPIFY_API_KEY: ${GEOAPIFY_API_KEY}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}

    depends_on:
      - nats

    networks:
      - nginx-network


  # -------------------------
  # FRONT
  # -------------------------
  front:
    image: ghcr.io/maximetavares/front:${IMAGE_TAG}
    restart: unless-stopped

    networks:
      - nginx-network

# -------------------------
# NETWORK
# -------------------------
networks:
  nginx-network:
    name: ${NETWORK_NAME}
    external: true