services:
    # -------------------------
    # EVENT BUS
    # -------------------------
    nats:
        image: nats:latest
        restart: unless-stopped
        ports:
            - "4222:4222"

    # -------------------------
    # AUTH SERVICE
    # -------------------------
    ms-auth:
        image: ghcr.io/maximetavares/ms-auth:${IMAGE_TAG}
        restart: unless-stopped
        environment:
            NATS_URL: nats://nats:4222
            MONGO_URL: mongodb://mongo:27017/auth
            FRONTEND_URL: ${FRONTEND_URL}
            GEOAPIFY_API_KEY: ${GEOAPIFY_API_KEY}
            JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
            JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
            JWT_ACCESS_EXPIRE: 30m
            JWT_REFRESH_EXPIRE: 7d
            JWT_ALGORITHM: HS512
        depends_on:
            - nats
        healthcheck:
            test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
            interval: 10s
            timeout: 5s
            retries: 3

    # -------------------------
    # GATEWAY
    # -------------------------
    gateway:
        image: ghcr.io/maximetavares/gateway:${IMAGE_TAG}
        ports:
            - "3000:3000"
        restart: unless-stopped
        environment:
            NATS_URL: nats://nats:4222
            FRONTEND_URL: ${FRONTEND_URL}
            GEOAPIFY_API_KEY: ${GEOAPIFY_API_KEY}
            JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
            JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
            JWT_ACCESS_EXPIRE: 30m
            JWT_REFRESH_EXPIRE: 7d
            JWT_ALGORITHM: HS512
        depends_on:
            - nats
        healthcheck:
            test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
            interval: 10s
            timeout: 5s
            retries: 3

    # -------------------------
    # FRONT
    # -------------------------
    front:
        image: ghcr.io/maximetavares/front:${IMAGE_TAG}
        ports:
            - "80:80"
        restart: unless-stopped

    # -------------------------
    # Mongo
    # -------------------------
    mongo:
        image: mongo:latest
        restart: unless-stopped
        ports:
            - "27017:27017"
        volumes:
            - mongo_data:/data/db

    volumes:
        mongo_data:
